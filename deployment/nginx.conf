# ─────────────────────────────────────────────────────────────────────────────
# Nginx configuration for Home Dashboard
# ─────────────────────────────────────────────────────────────────────────────
# Place at: /etc/nginx/sites-available/home-dashboard
# Enable:   ln -s /etc/nginx/sites-available/home-dashboard /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 8082; # Pi-Hole owns 80 and 8080
    # Replace with your domain or leave as _ for IP-based access
    server_name _;

    # ── Static frontend (Next.js export output) ──────────────────────────
    # Build output goes to: /var/www/home-dashboard/
    root /var/www/home-dashboard;
    index index.html;

    # Security: don't expose hidden files
    location ~ /\. {
        deny all;
    }

    # Serve static assets with long cache
    location /_next/static/ {
        alias /var/www/home-dashboard/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve the static HTML pages
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # ── Reverse proxy to Rust backend ────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (keep low for a LAN dashboard)
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_send_timeout 5s;
    }

    # ── Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 512;
    gzip_types
        text/html
        text/css
        text/plain
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
